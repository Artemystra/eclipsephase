<form class="{{cssClass}}" autocomplete="off">
    <header class="sheet-header itemHeader">
        <img class="item-img" src="{{item.img}}" data-edit="img" title="{{item.name}}"/>
        <div class="header-fields">
            <h1 class="charname"><input name="name" type="text" value="{{item.name}}" placeholder="Name"/></h1>
            <div class="grid grid-2col">
            </div>
        </div>
    </header>

    {{!-- Sheet Body --}}
    <section class="item-sheet-body">
        <div class="grid grid-2col">
            <div class="flexrow flex-group-left">
                <label class="resource-label input-medium">
                    <td><label class="resource-label">{{localize "ep2e.item.program.table.level.label"}}:</label>
                <select name="system.programLevel" data-type="String">
                    {{selectOptions config.programLevels selected=item.system.programLevel localize=true}}
                </select>
            </div>
        </div>
        <p></p>
        <h2>{{localize "ep2e.item.general.table.description"}}</h2>
        {{editor item.system.description target="system.description" button=true owner=owner editable=this.options.editable}}
    </section>
</form>
